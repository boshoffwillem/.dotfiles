set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# Keep a large scrollback history
set -g history-limit 100000

# Use vi-style keys in copy mode (optional but nice)
setw -g mode-keys vi

# Make wheel scroll enter copy-mode and scroll
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "copy-mode -e; send-keys -M"
bind -n WheelDownPane select-pane -t = \; send-keys -M
